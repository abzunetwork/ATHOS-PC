services:
  - type: web
    name: athos-pc-kernel
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn athos_kernel:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ATHOS_API_KEY
        sync: true  # Set manually in dashboard for security
