services:
  - type: web
    name: athos-pc-kernel
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ATHOS_API_KEY
        generateValue: true
      - key: ATHOS_L3_PATH
        value: /tmp/athos_archive
